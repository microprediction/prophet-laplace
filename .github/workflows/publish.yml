name: publish

# Build the package and upload to PyPI. Triggers when a GitHub release is
# published (tag the release v<version>), or manually via the Actions tab.
# Uses repo secrets PYPI_USERNAME / PYPI_PASSWORD (set __token__ + a PyPI API
# token for token auth).
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: build
        run: |
          python -m pip install --upgrade build twine
          python -m build
      - name: check metadata
        run: python -m twine check dist/*
      - name: upload to PyPI
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: python -m twine upload --non-interactive dist/*
